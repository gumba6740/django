<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>todolist</title>
</head>
<body>
    <h1>할 일 목록</h1>
    <ul>
        {% for todo in todos %}
            <li>
            <a href="/todo/{{ todo.id }}">
                {{ todo.title }}: {{ todo.description }}
            </a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
