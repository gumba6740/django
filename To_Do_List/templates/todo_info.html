<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ todo.title }}</title>
</head>
<body>
    <h1>{{ todo.title }}</h1>
    <hr>
    <p>할일: {{todo.title}}</p>
    <p>상세: {{ todo.description }}</p>
    <p>수행여부:
      {% if todo.is_completed == False %}
        X
      {% else %}
        O
      {% endif %}
    </p>
    <p>시작날짜: {{ todo.start_date }}</p>
    <p>종료날짜: {{ todo.end_date }}</p>
</body>
</html>
