{% extends 'cbv_base.html' %}

{% block title %}할 일 수정{% endblock %}

{% block headline %}
    <a class="text-decoration-none text-white" href="{% url 'cbv_todo:info' todo_id=todo.pk %}">이전으로</a>
{% endblock %}

{% block login %}{% endblock %}

{% block content %}
    <form action="{% url 'cbv_todo:update' todo_id=todo.pk %}" method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button>수정</button>
    </form>
{% endblock %}
